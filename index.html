<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מיזם המיליון — תחזוקה זמנית</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Heebo',sans-serif;background:linear-gradient(160deg,#fdf6ff 0%,#fce8f3 40%,#ede8ff 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;direction:rtl}
.box{text-align:center;padding:48px 32px;max-width:420px}
.icon{font-size:72px;margin-bottom:28px;display:block}
h1{font-size:30px;font-weight:900;color:#1A1333;margin-bottom:16px;line-height:1.4}
.sub{font-size:17px;color:#8878BB;line-height:1.8;margin-bottom:8px}
.small{font-size:14px;color:#B0A0D0;margin-top:8px}
.dots{margin-top:32px;font-size:28px;color:#9B7DFF}
.dot{display:inline-block;animation:blink 1.4s infinite both}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:0}40%{opacity:1}}
</style>
</head>
<body>
<div class="box">
  <span class="icon">🙏</span>
  <h1>מיזם המיליון<br>מזמור לתודה</h1>
  <p class="sub">האתר בתחזוקה זמנית</p>
  <p class="small">נשוב בהקדם עם שדרוגים חדשים!</p>
  <div class="dots">
    <span class="dot">•</span><span class="dot">•</span><span class="dot">•</span>
  </div>
</div>
</body>
</html>
